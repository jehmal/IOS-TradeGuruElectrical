name: iOS Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build .app for Simulator
        run: |
          cd ios
          xcodebuild build \
            -project Tradeguruelectrical.xcodeproj \
            -scheme Tradeguruelectrical \
            -configuration Debug \
            -sdk iphonesimulator \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR=$PWD/output \
            2>&1 | tail -80

      - name: Debug build output
        if: always()
        run: |
          echo "=== Build output structure ==="
          find ios/output -type d -maxdepth 4 2>/dev/null || true
          echo "=== Looking for .app bundles ==="
          find ios/output -name "*.app" -type d 2>/dev/null || true
          echo "=== Default build location ==="
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -5 || true
          echo "=== Check build/Debug-iphonesimulator ==="
          ls -la ios/output/Debug-iphonesimulator/ 2>/dev/null || true

      - name: Package .app for Appetize
        if: success()
        run: |
          APP_PATH=$(find ios/output -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Tradeguruelectrical.app" -type d | head -1)
          fi
          if [ -n "$APP_PATH" ]; then
            echo "Found app: $APP_PATH"
            echo "Contents:"
            ls -la "$APP_PATH/"
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/TradeGuruElectrical.zip" "$(basename "$APP_PATH")"
            ls -lh "$GITHUB_WORKSPACE/TradeGuruElectrical.zip"
          else
            echo "ERROR: No .app bundle found anywhere"
            exit 1
          fi

      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TradeGuruElectrical-Simulator
          path: TradeGuruElectrical.zip
          if-no-files-found: error
          retention-days: 30
