name: iOS Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          xcrun simctl list devices available | grep iPhone | head -3

      - name: Build .app for Simulator
        run: |
          cd ios
          xcodebuild build \
            -project Tradeguruelectrical.xcodeproj \
            -scheme Tradeguruelectrical \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -60

      - name: Package .app for Appetize
        if: success()
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found: $APP_PATH"
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/TradeGuruElectrical.zip" "$(basename "$APP_PATH")"
            ls -lh "$GITHUB_WORKSPACE/TradeGuruElectrical.zip"
          else
            echo "No .app found. Checking build dir:"
            find ios/build -type d -maxdepth 6 | head -20
          fi

      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TradeGuruElectrical-Simulator
          path: TradeGuruElectrical.zip
          if-no-files-found: warn
          retention-days: 30
