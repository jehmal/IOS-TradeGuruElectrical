name: iOS Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build for Simulator
        run: |
          cd ios
          xcodebuild build \
            -scheme Tradeguruelectrical \
            -destination 'generic/platform=iOS Simulator' \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50

      - name: Package .app for Appetize
        if: success()
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/TradeGuruElectrical.zip" "$(basename "$APP_PATH")"
            echo "Zipped to TradeGuruElectrical.zip"
            ls -lh "$GITHUB_WORKSPACE/TradeGuruElectrical.zip"
          else
            echo "No .app bundle found"
            exit 1
          fi

      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TradeGuruElectrical-Simulator
          path: TradeGuruElectrical.zip
          retention-days: 30
