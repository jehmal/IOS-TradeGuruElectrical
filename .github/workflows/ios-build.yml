name: iOS Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build .app for Simulator
        run: |
          cd ios
          xcodebuild build \
            -project Tradeguruelectrical.xcodeproj \
            -scheme Tradeguruelectrical \
            -configuration Debug \
            -sdk iphonesimulator \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_PREVIEWS=NO \
            BUILD_DIR=$PWD/output \
            2>&1 | tail -80

      - name: Inspect .app bundle
        if: success()
        run: |
          APP_PATH=$(find ios/output -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          echo "=== Bundle contents ==="
          ls -la "$APP_PATH/" 2>/dev/null || true
          echo "=== Info.plist ==="
          cat "$APP_PATH/Info.plist" 2>/dev/null || plutil -p "$APP_PATH/Info.plist" 2>/dev/null || echo "No Info.plist"
          echo "=== Executable ==="
          file "$APP_PATH/Tradeguruelectrical" 2>/dev/null || echo "No executable found"
          echo "=== All files in .app ==="
          find "$APP_PATH" -type f 2>/dev/null

      - name: Package .app for Appetize
        if: success()
        run: |
          APP_PATH=$(find ios/output -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/TradeGuruElectrical.zip" "$(basename "$APP_PATH")"
            ls -lh "$GITHUB_WORKSPACE/TradeGuruElectrical.zip"
          else
            echo "No .app found"
            exit 1
          fi

      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TradeGuruElectrical-Simulator
          path: TradeGuruElectrical.zip
          if-no-files-found: error
          retention-days: 30
