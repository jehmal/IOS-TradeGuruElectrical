name: iOS Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Generate Xcode project
        run: |
          cd ios
          swift package generate-xcodeproj 2>/dev/null || true
          # If generate-xcodeproj is deprecated, create a workspace manually
          if [ ! -d "Tradeguruelectrical.xcodeproj" ]; then
            echo "Generating project via xcodebuild..."
            # Use xcodebuild with SPM scheme directly — it resolves from Package.swift
          fi

      - name: Build app for Simulator
        run: |
          cd ios
          xcodebuild build \
            -scheme Tradeguruelectrical \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.tradeguru.electrical \
            PRODUCT_NAME=TradeGuruElectrical \
            INFOPLIST_KEY_CFBundleDisplayName=TradeGuru \
            2>&1 | tail -80

      - name: Find and package build output
        if: success()
        run: |
          echo "=== Searching for build products ==="
          find ios/build -name "*.app" -type d 2>/dev/null || true
          find ios/build -name "*.o" -type f 2>/dev/null | head -5 || true
          find ios/build -type d -maxdepth 5 2>/dev/null | head -30 || true

          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/TradeGuruElectrical.zip" "$(basename "$APP_PATH")"
            ls -lh "$GITHUB_WORKSPACE/TradeGuruElectrical.zip"
          else
            echo "No .app bundle found — SPM library build only (compile check passed)"
            echo "To generate .app, project needs .xcodeproj with app target"
          fi

      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TradeGuruElectrical-Simulator
          path: TradeGuruElectrical.zip
          if-no-files-found: ignore
          retention-days: 30
