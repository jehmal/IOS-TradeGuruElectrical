name: iOS Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Generate Xcode project via xcodegen
        run: |
          brew install xcodegen

          cd ios

          cat > project.yml << 'YAML'
          name: Tradeguruelectrical
          options:
            bundleIdPrefix: com.tradeguru
            deploymentTarget:
              iOS: "18.0"
            xcodeVersion: "16.0"
          settings:
            base:
              SWIFT_VERSION: "6.0"
              SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
          targets:
            Tradeguruelectrical:
              type: application
              platform: iOS
              sources:
                - path: Tradeguruelectrical
                  excludes:
                    - "Preview Content/**"
              resources:
                - path: Tradeguruelectrical/Assets.xcassets
              entitlements:
                path: Tradeguruelectrical/Tradeguruelectrical.entitlements
              settings:
                base:
                  GENERATE_INFOPLIST_FILE: YES
                  INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
                  INFOPLIST_KEY_UILaunchScreen_Generation: YES
                  INFOPLIST_KEY_NSCameraUsageDescription: "TradeGuru needs camera access to photograph electrical installations for AI-assisted fault diagnosis"
                  INFOPLIST_KEY_NSMicrophoneUsageDescription: "TradeGuru needs microphone access for voice input"
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                  ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
                  PRODUCT_BUNDLE_IDENTIFIER: com.tradeguru.electrical
                  TARGETED_DEVICE_FAMILY: "1,2"
                  CODE_SIGNING_ALLOWED: NO
                  ENABLE_PREVIEWS: NO
          YAML

          xcodegen generate
          echo "Generated project:"
          ls -la Tradeguruelectrical.xcodeproj/

      - name: Build .app for Simulator
        run: |
          cd ios
          xcodebuild build \
            -project Tradeguruelectrical.xcodeproj \
            -scheme Tradeguruelectrical \
            -configuration Debug \
            -sdk iphonesimulator \
            -arch arm64 \
            BUILD_DIR=$PWD/output \
            2>&1 | tail -60

      - name: Inspect .app bundle
        if: always()
        run: |
          APP_PATH=$(find ios/output -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "App: $APP_PATH"
            echo "Size: $(du -sh "$APP_PATH" | cut -f1)"
            echo "Files:"
            find "$APP_PATH" -type f | head -20
            echo "Executable check:"
            file "$APP_PATH/Tradeguruelectrical" 2>/dev/null || echo "No executable"
          else
            echo "No .app found"
            find ios/output -type f 2>/dev/null | head -10
          fi

      - name: Package .app for Appetize
        if: success()
        run: |
          APP_PATH=$(find ios/output -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ] && [ -f "$APP_PATH/Tradeguruelectrical" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/TradeGuruElectrical.zip" "$(basename "$APP_PATH")"
            ls -lh "$GITHUB_WORKSPACE/TradeGuruElectrical.zip"
          else
            echo "No valid .app with executable found"
            exit 1
          fi

      - name: Upload .app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TradeGuruElectrical-Simulator
          path: TradeGuruElectrical.zip
          if-no-files-found: error
          retention-days: 30
