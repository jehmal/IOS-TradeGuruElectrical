name: iOS Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available | grep iPhone | head -5

      - name: Build iOS Package
        run: |
          cd ios
          xcodebuild build \
            -scheme Tradeguruelectrical \
            -destination 'generic/platform=iOS Simulator' \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50

      - name: Build Result
        if: success()
        run: echo "BUILD SUCCEEDED"

      - name: Build Failed
        if: failure()
        run: echo "BUILD FAILED — check logs above"
